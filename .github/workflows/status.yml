name: GitHub Stats
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: [ "master", "main" ]

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Detailed Overview
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          user: oOSatyamOo
          template: classic
          # 'base' handles Stars, Forks, and general metadata
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Kolkata
          
          # This adds the "Full Time" contribution calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          
          # This adds Repo views and detailed contributions
          plugin_followup: yes
          plugin_followup_sections: user, repositories
          
          filename: generated/overview.svg

      - name: Generate Language Stats
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          user: oOSatyamOo
          template: classic
          base: ""
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          filename: generated/languages.svg
